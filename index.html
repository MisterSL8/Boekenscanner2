<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Boek Laser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 AI Boek Laser</h1>
            <div id="connection-status" class="status-badge connected">Camera Stand-by</div>
        </header>

        <main>
            <div class="scanner-card">
                <!-- Puur HTML5 video-element -->
                <video id="video" style="width: 100%; height: auto; background: #000;" autoplay playsinline></video>
            </div>

            <!-- Handmatig invoerveld als back-up als de camera op PC/telefoon weigert -->
            <div class="manual-input-box" style="margin-bottom: 20px;">
                <input type="text" id="manual-isbn" placeholder="Of typ ISBN handmatig..." style="width: 70%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white;">
                <button id="btn-manual-search" style="padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; width: 25%;">Zoek</button>
            </div>

            <div id="result-card" class="result-card hidden">
                <h2 id="res-title">Boek Laden...</h2>
                <div class="isbn-badge" id="res-isbn">9789000000000</div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="label">Bol.com Prijs</span>
                        <span class="value" id="res-price">€ 0,00</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Netto Winst</span>
                        <span class="value profit" id="res-profit">€ 0,00</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Snelheid</span>
                        <span class="value rank-badge" id="res-rank">-</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Gegenereerde SKU</span>
                        <span class="value sku" id="res-sku">-</span>
                    </div>
                </div>
                
                <button id="btn-save" class="btn-primary">💾 Sla op in Voorraad</button>
            </div>
        </main>

        <section class="history-section">
            <h3>📋 Gescande Voorraad (Supabase)</h3>
            <ul id="inventory-list" class="inventory-list"></ul>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
